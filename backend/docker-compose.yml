# ──────────────────────────────────────────────────────────
# Learnova — Docker Compose (PostgreSQL for Prisma)
# ──────────────────────────────────────────────────────────
# Usage:
#   docker compose up -d        ← start the database
#   docker compose down          ← stop
#   docker compose down -v       ← stop + delete data volume
# ──────────────────────────────────────────────────────────

services:
  db:
    image: postgres:16-alpine
    container_name: learnova_db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-divyesh}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret123}
      POSTGRES_DB: ${POSTGRES_DB:-learnova}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-divyesh} -d ${POSTGRES_DB:-learnova}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
